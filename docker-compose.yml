services:
  # ── Shared Rust builder ────────────────────────────────────────────────────
  # Compiles every workspace binary once via cargo-chef + BuildKit cache
  # mounts, tags the result `velociraptor/builder:latest`. Each runtime
  # service Dockerfile (executor / orderbook_server / backend) then does
  # `FROM velociraptor/builder` and copies its binary into a thin
  # debian-slim layer — one workspace compile, three runtime images.
  #
  # The `build-only` profile keeps this from running on `docker compose up`.
  # ALWAYS rebuild the builder first when source changes:
  #
  #   docker compose --profile build-only build builder
  #   docker compose build executor orderbook_server backend
  #   docker compose up -d
  #
  # Or in one step (rebuilds everything):
  #
  #   docker compose --profile build-only build && docker compose build && docker compose up -d
  builder:
    build:
      context: .
      dockerfile: Dockerfile.builder
    image: velociraptor/builder:latest
    profiles: ["build-only"]

  redis:
    image: redis:7-alpine
    container_name: velociraptor-redis
    command:
      - redis-server
      - --save
      - ""
      - --appendonly
      - "no"
      - --stop-writes-on-bgsave-error
      - "no"
      - --maxmemory
      - 512mb
      - --maxmemory-policy
      - noeviction
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - ./data/redis:/data
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    image: velociraptor/backend:latest
    container_name: velociraptor-backend
    command: ["--config", "/app/configs/example.docker.yaml"]
    volumes:
      - ./configs:/app/configs:ro
      - ./credentials:/app/credentials:ro
      - ./data/syslog:/app/syslog
      # Read-only mount of the data volume so the monitor page can report
      # per-subfolder usage (backend.data_dir = /app/data).
      - ./data:/app/data:ro
    depends_on:
      - redis
    ports:
      - "127.0.0.1:3000:3000"
    restart: unless-stopped

  orderbook_server:
    build:
      context: .
      dockerfile: zmq_server/Dockerfile
    image: velociraptor/orderbook-server:latest
    container_name: velociraptor-orderbook-server
    command: ["--config", "/app/configs/example.docker.yaml"]
    volumes:
      - ./configs:/app/configs:ro
      - ./credentials:/app/credentials:ro
      - ./data:/app/data
      - ./data/syslog:/app/syslog
    depends_on:
      - redis
    ports:
      - "127.0.0.1:5555:5555"  # market PUB
      - "127.0.0.1:5556:5556"  # control ROUTER (subscribe handshake)
      - "127.0.0.1:5559:5559"  # user-event PUB (consumed by trading_engine)
    restart: unless-stopped

  executor:
    build:
      context: .
      dockerfile: executor/Dockerfile
    image: velociraptor/executor:latest
    container_name: velociraptor-executor
    # All endpoints / dirs come from the executor: section of the config.
    # --skip-chmod-check is needed because docker bind-mounts host files with
    # whatever perms they have on the host.
    command:
      - "--config"
      - "/app/configs/example.docker.yaml"
      - "--credentials"
      - "/app/credentials/polymarket.yaml"
      - "--skip-chmod-check"
    volumes:
      - ./configs:/app/configs:ro
      - ./credentials:/app/credentials:ro
      - ./data:/app/data
      - ./data/syslog:/app/syslog
    depends_on:
      - redis
    ports:
      - "127.0.0.1:5557:5557"
      - "127.0.0.1:5558:5558"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: velociraptor/frontend:latest
    container_name: velociraptor-frontend
    depends_on:
      - backend
    ports:
      - "127.0.0.1:8080:80"
    restart: unless-stopped

services:
  redis:
    image: redis:7-alpine
    container_name: velociraptor-redis
    command:
      - redis-server
      - --appendonly
      - "no"
      - --maxmemory
      - 512mb
      - --maxmemory-policy
      - noeviction
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - ./data/redis:/data
    restart: unless-stopped

# Polymarket example configuration
# Run with: cargo run --example polymarket_orderbook -- --config configs/polymarket.toml

# Display settings

[server]
depth           = 8    # orderbook levels to record per side
render_interval = 300   # ms between terminal redraws (independent of write rate)
base_path       = "/tmp/polymarket_data"
flush_interval  = 500  # ms between BufWriter flushes
zstd_level      = 3     # 0 = disabled, 1–22 = zstd level

# Rolling up/down markets — token IDs resolved automatically from the Gamma API.
# interval_secs: window size in seconds (900 = 15min, 300 = 5min)

#[[polymarket]]
#enabled          = true
#slug             = "btc-updown-15m"
#interval_secs    = 900

#[[polymarket]]
#enabled          = true
#slug             = "eth-updown-15m"
#interval_secs    = 900

[[polymarket]]
enabled          = true
slug             = "btc-updown-5m"
interval_secs    = 300

[[polymarket]]
enabled          = true
slug             = "eth-updown-5m"
interval_secs    = 300

# Static market (no rolling window — slug used directly):
# [[polymarket]]
# enabled          = true
# slug             = "will-btc-reach-100k-in-2025"
# interval_secs    = 0

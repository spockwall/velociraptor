server:
  pub_endpoint: "tcp://*:5555"
  router_endpoint: "tcp://*:5556"
  render_interval: 300

logging:
  level: "info"
  json: false
  dir: "/app/syslog"     # files: {dir}/{service}/log.YYYY-MM-DD and …/error.log.YYYY-MM-DD

redis:
  enabled: true
  url: "redis://redis:6379"
  snapshot_cap: 1000
  trade_cap: 500
  event_list_cap: 5000

backend:
  port: 3000

storage:
  enabled: false
  base_path: "./data"
  depth: 20
  flush_interval: 1000
  rotation: "daily"
  zstd_level: 0

binance:
  enabled: true
  symbols:
    - "btcusdt"
    - "ethusdt"

binance_spot:
  enabled: true
  symbols:
    - "btcusdt"
    - "ethusdt"

okx:
  enabled: true
  symbols:
    - "BTC-USDT"
    - "ETH-USDT"

hyperliquid:
  enabled: true
  coins:
    - "BTC"
    - "ETH"

kalshi:
  market:
    - enable: true
      series: "KXBTC15M"
      interval_secs: 900
    - enable: true
      series: "KXETH15M"
      interval_secs: 900

polymarket:
  markets:
    - enabled: true
      slug: "btc-updown-15m"
      interval_secs: 900
    - enabled: true
      slug: "eth-updown-15m"
      interval_secs: 900
    - enabled: true
      slug: "btc-updown-5m"
      interval_secs: 300
    - enabled: true
      slug: "eth-updown-5m"
      interval_secs: 300

# ── Executor (Polymarket REST client + ZMQ ROUTER gateway) ───────────────────
# Use 0.0.0.0 for metrics inside the container so docker port mapping reaches it.
executor:
  router_endpoint: "tcp://*:5557"
  metrics_addr: "0.0.0.0:5558"
  audit_dir: "/app/data/executor"
  audit_stream_cap: 100000
  polymarket_env: "prod"

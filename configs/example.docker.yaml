server:
  pub_endpoint: "tcp://*:5555"
  router_endpoint: "tcp://*:5556"
  render_interval: 300

logging:
  level: "info"
  json: false
  dir: "/app/syslog"     # files: {dir}/{service}/log.YYYY-MM-DD and …/error.log.YYYY-MM-DD

redis:
  enabled: true
  url: "redis://redis:6379"
  snapshot_cap: 1000
  trade_cap: 500
  event_list_cap: 5000

backend:
  port: 3000
  # Subfolders under this dir are shown on the monitor page (du-style sizes).
  # In Docker the data volume is mounted at /app/data (see docker-compose.yml:
  # the backend service mounts ./data -> /app/data). On a bare-metal/systemd
  # server deploy set this to the real data volume, e.g. /data.
  data_dir: "/app/data"

storage:
  enabled: false
  base_path: "./data"
  depth: 20
  flush_interval: 1000
  rotation: "daily"
  zstd_level: 0

binance:
  enabled: true
  symbols:
    - "btcusdt"
    - "ethusdt"

binance_spot:
  enabled: true
  symbols:
    - "btcusdt"
    - "ethusdt"

okx:
  enabled: true
  symbols:
    - "BTC-USDT"
    - "ETH-USDT"

hyperliquid:
  enabled: true
  coins:
    - "BTC"
    - "ETH"

kalshi:
  market:
    - enable: true
      series: "KXBTC15M"
      interval_secs: 900
    - enable: true
      series: "KXETH15M"
      interval_secs: 900

polymarket:
  markets:
    - enabled: true
      slug: "btc-updown-15m"
      interval_secs: 900
    - enabled: true
      slug: "eth-updown-15m"
      interval_secs: 900
    - enabled: true
      slug: "btc-updown-5m"
      interval_secs: 300
    - enabled: true
      slug: "eth-updown-5m"
      interval_secs: 300

# ── Executor (Polymarket REST client + ZMQ ROUTER gateway) ───────────────────
# Use 0.0.0.0 for metrics inside the container so docker port mapping reaches it.
executor:
  router_endpoint: "tcp://*:5557"
  metrics_addr: "0.0.0.0:5558"
  audit_dir: "/app/data/executor"
  audit_stream_cap: 100000
  polymarket_env: "prod"

# ── Pre-trade risk gate (executor) ───────────────────────────────────────────
# Disabled by default. See configs/example.yaml for the full annotated shape.
# Hot-reload via: SET executor:reload_config 1 (or the frontend "reload risk").
# Six rules (all optional under `default` / `<symbol>`):
#   min_qty | max_qty | max_notional | price_ref_max_deviation_pct
#   max_orders_per_min | max_open_orders
risk:
  enabled: false
  exchanges:
    polymarket:
      default:
        min_qty: 1
        max_qty: 100
        max_notional: 500
        price_ref_max_deviation_pct: 20
        max_orders_per_min: 30
        max_open_orders: 10
      symbols: {}
    kalshi:
      default:
        min_qty: 1
        max_qty: 200
        max_notional: 500
        price_ref_max_deviation_pct: 20
        max_orders_per_min: 30
        max_open_orders: 10
      symbols: {}

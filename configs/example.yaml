server:
  pub_endpoint: "tcp://*:5555"
  router_endpoint: "tcp://*:5556"
  render_interval: 300

# ── Executor (Polymarket REST client + ZMQ ROUTER gateway) ───────────────────
executor:
  router_endpoint: "tcp://*:5557"
  metrics_addr: "127.0.0.1:5558"
  audit_dir: "./data/executor"
  audit_stream_cap: 100000
  polymarket_env: "prod"    # "prod" | "testnet"

logging:
  level: "info"          # env-filter string, e.g. "info,libs=debug"
  json: false            # set true to emit JSON-formatted records
  dir: "./data/syslog"   # files: {dir}/{service}/log.YYYY-MM-DD and …/error.log.YYYY-MM-DD

redis:
  enabled: true
  url: "redis://127.0.0.1:6379"
  snapshot_cap: 1000     # max snapshots kept per symbol in snapshots:{exchange}:{symbol}
  trade_cap: 500         # max trades kept per symbol in trades:{exchange}:{symbol}
  event_list_cap: 5000   # max entries in events:fills / events:orders / events:log

backend:
  port: 3000
  # Root dir whose immediate subfolders the monitor page reports du-style usage
  # for. On the server this is the data volume (`/data`); on a dev box without
  # it the monitor's data_usage is just empty.
  data_dir: "/data"

storage:
  enabled: false
  base_path: "./data"
  depth: 20 # depth levels to store (bids + asks)
  flush_interval: 1000 # ms between BufWriter flushes
  rotation: "daily" # "daily" | "none"
  zstd_level: 0 # 0 = disabled, 1–22 = zstd compression level (3 is a good default)

binance:
  enabled: true
  symbols:
    - "btcusdt"
    - "ethusdt"

binance_spot:
  enabled: true
  symbols:
    - "btcusdt"
    - "ethusdt"

okx:
  enabled: true
  symbols:
    - "BTC-USDT"
    - "ETH-USDT"

hyperliquid:
  enabled: true
  coins: # uppercase coin names
    - "BTC"
    - "ETH"

kalshi:
  market:
    - enable: true
      series: "KXBTC15M"
      interval_secs: 900
    - enable: true
      series: "KXETH15M"
      interval_secs: 900

polymarket:
  markets:
    - enabled: true
      slug: "btc-updown-15m"
      interval_secs: 900
    - enabled: true
      slug: "eth-updown-15m"
      interval_secs: 900

    - enabled: true
      slug: "btc-updown-5m"
      interval_secs: 300

    - enabled: true
      slug: "eth-updown-5m"
      interval_secs: 300

    ## example of static market
    #- enabled: false
    #  slug: "will-btc-reach-100k-in-2025"
    #  interval_secs: 0


# ── Pre-trade risk gate (executor) ───────────────────────────────────────────
# Disabled by default. When enabled, every Place (and each PlaceBatch leg) is
# checked against the resolved limits for its (exchange, symbol). A symbol
# override is per-field merged over the exchange `default`; an exchange with
# no entry is unrestricted. Hot-reload: SET executor:reload_config 1 (or click
# "reload risk" in the frontend Control page) after editing this block — no
# executor restart needed.
#
# Every field under `default` / `<symbol>` is optional. Leave a field unset
# (or comment it out) to disable that rule for the scope. The six rules:
#   min_qty                       — reject qty below this floor
#   max_qty                       — reject qty above this ceiling
#   max_notional                  — reject px*qty above this
#   price_ref_max_deviation_pct   — reject |px - bba_mid| / bba_mid > pct
#                                   (fails open if no bba mid available)
#   max_orders_per_min            — rolling 60s placement rate per (ex, sym)
#   max_open_orders               — best-effort concurrent open-order cap
risk:
  enabled: false
  exchanges:
    polymarket:
      default:
        min_qty: 1                          # floor (Polymarket min is 5 USDC notional anyway)
        max_qty: 100                        # ceiling per single order
        max_notional: 500                   # per-order $ cap
        price_ref_max_deviation_pct: 20     # fat-finger guard vs bba mid
        max_orders_per_min: 30              # rolling 60s, per (exchange,symbol)
        max_open_orders: 10                 # best-effort concurrent cap
      symbols: {}
        # Per-token-id override; per-field merged over `default` above.
        # "21742633143463906290569050155826241533067272736897614950488156847949938836455":
        #   max_qty: 50
        #   max_notional: 100
    kalshi:
      default:
        min_qty: 1
        max_qty: 200
        max_notional: 500
        price_ref_max_deviation_pct: 20
        max_orders_per_min: 30
        max_open_orders: 10
      symbols: {}
        # "KXBTC15M-26MAY2510-T100000":
        #   max_qty: 100

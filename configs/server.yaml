# Orderbook server configuration
# Run with: cargo run --bin orderbook_server -- --config configs/server.toml

server:
  pub_endpoint: "tcp://*:5555"
  router_endpoint: "tcp://*:5556"
  render_interval: 300

storage:
  enabled: false
  base_path: "./data"
  depth: 20 # depth levels to store (bids + asks)
  flush_interval: 1000 # ms between BufWriter flushes
  rotation: "daily" # "daily" | "none"
  zstd_level: 0 # 0 = disabled, 1–22 = zstd compression level (3 is a good default)

binance:
  enabled: true
  symbols:
    - "btcusdt"
    - "ethusdt"

okx:
  enabled: true
  symbols:
    - "BTC-USDT"
    - "ETH-USDT-SWAP"

hyperliquid:
  enabled: true
  coins: # uppercase coin names
    - "BTC"
    - "ETH"

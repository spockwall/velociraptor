# Orderbook server configuration
# Run with: cargo run --bin orderbook_server -- --config configs/server.toml

server:
  pub_endpoint: "tcp://*:5555"
  router_endpoint: "tcp://*:5556"
  render_interval: 300

# ── Executor (Polymarket REST client + ZMQ ROUTER gateway) ───────────────────
executor:
  router_endpoint: "tcp://*:5557"
  metrics_addr: "127.0.0.1:5558"
  audit_dir: "./data/executor"
  audit_stream_cap: 100000
  polymarket_env: "prod"    # "prod" | "testnet"

logging:
  level: "info"          # env-filter string, e.g. "info,libs=debug"
  json: false            # set true to emit JSON-formatted records
  dir: "/data/syslog"   # files: {dir}/server/log.YYYY-MM-DD and …/error.log.YYYY-MM-DD

storage:
  enabled: true
  base_path: "/data/orderbook"
  depth: 20 # depth levels to store (bids + asks)
  flush_interval: 1000 # ms between BufWriter flushes
  rotation: "daily" # "daily" | "none"
  zstd_level: 0 # 0 = disabled, 1–22 = zstd compression level (3 is a good default)

binance:
  enabled: true
  symbols:
    - "btcusdt"
    - "ethusdt"

binance_spot:
  enabled: true
  symbols:
    - "btcusdt"
    - "ethusdt"

okx:
  enabled: true
  symbols:
    - "BTC-USDT"
    - "ETH-USDT"

hyperliquid:
  enabled: true
  coins: # uppercase coin names
    - "BTC"
    - "ETH"

# ── Kalshi rolling markets ───────────────────────────────────────────────────
# Each entry subscribes the current window of a Kalshi series and publishes
# `ob:kalshi:{series}` / `bba:kalshi:{series}` to Redis + the ZMQ snapshot
# topic (via `spawn_kalshi_schedulers` in orderbook_server). Needs
# credentials/kalshi.yaml for the RSA-PSS WS upgrade.
kalshi:
  market:
    - enable: true
      series: "KXBTC15M"
      interval_secs: 900
    - enable: true
      series: "KXETH15M"
      interval_secs: 900

polymarket:
  markets:
    - enabled: true
      slug: "btc-updown-15m"
      interval_secs: 900
    - enabled: true
      slug: "eth-updown-15m"
      interval_secs: 900

    - enabled: true
      slug: "btc-updown-5m"
      interval_secs: 300

    - enabled: true
      slug: "eth-updown-5m"
      interval_secs: 300

# ── Pre-trade risk gate (executor) ───────────────────────────────────────────
# Disabled by default. See configs/example.yaml for the full annotated shape.
# Hot-reload via: SET executor:reload_config 1 (or the frontend "reload risk").
risk:
  enabled: false
  exchanges:
    polymarket:
      default:
        max_qty: 100
        max_notional: 500
      symbols: {}
    kalshi:
      default:
        max_qty: 200
      symbols: {}

# Orderbook server configuration
# Run with: cargo run --bin orderbook_server -- --config configs/server.toml

[server]
pub_endpoint    = "tcp://*:5555"
router_endpoint = "tcp://*:5556"
depth           = 20

[logging]
level = "info"
json  = false

[binance]
enabled = true
symbols = ["btcusdt", "ethusdt"]

[okx]
enabled = true
symbols = ["BTC-USDT", "ETH-USDT-SWAP"]

[hyperliquid]
enabled = true
coins   = ["BTC", "ETH"]   # uppercase coin names

[storage]
enabled        = false
base_path      = "./data"
depth          = 20          # depth levels to store (bids + asks)
flush_interval = 1000        # ms between BufWriter flushes
rotation       = "daily"     # "daily" | "none"

# Each Polymarket market is a pair of Yes/No tokens.
# Use scripts/fetch_polymarket_tokens.py to find token IDs.
[[polymarket]]
enabled = true
question = "BitBoy convicted?"
yes = "75467129615908319583031474642658885479135630431889036121812713428992454630178"
no  = "3842963720267267286970642336860752782302644680156535061700039388405652129691"

